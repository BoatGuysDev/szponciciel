name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - '.env.example'
      - '.gitignore'
      - '**.md'
      - '.claude/**'
      - 'migrations/**'

permissions:
  contents: read

env:
  RUN_MODE: test

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: '3.13'
        enable-cache: true
    - name: Cache virtualenv
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
    - name: Install dependencies
      run: uv sync --locked
    - name: Run tests
      run: uv run pytest

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
