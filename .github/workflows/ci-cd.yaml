name: CI/CD Pipeline

on:
    pull_request:
        branches: [ main ]
        types: [ opened, synchronize, reopened ]
        paths-ignore:
            - '.env.example'
            - '**.md'
            - '**.lock'
            - '**.toml'
            - '.claude/**'
            - '.github/**'
            - 'migrations/**'

permissions:
    contents: read

env:
    RUN_MODE: test

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --locked
    - name: Run tests
      run: |
        uv run pytest

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
